    body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(18,18,18,0.8);
  border-bottom: 1px solid #333;
  z-index: 1000;
  padding: 1rem;
}

nav a {
  color: #ccc;
  margin: 0 1rem;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #ff6f00;
}

/* CONTAINER */
.container {
  padding: 2rem;
}

/* GAME GRID */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1.5rem;
}
.game-card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
}

.game-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  transition: 0.4s;
}

.game-card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  text-align: center;
  font-weight: bold;
}

/* badge */
.game-card::after {
  content: "POPULER";
  position: absolute;
  top: 10px;
  left: 10px;
  background: #ff6f00;
  padding: 3px 8px;
  font-size: 10px;
  border-radius: 5px;
}

.game-card {
  background: rgba(255,255,255,0.05);
  padding: 1.5rem;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
overflow: hidden;
}
.game-card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,111,0,0.2), transparent);
  top: -50%;
  left: -50%;
  opacity: 0;
  transition: 0.5s;
}

.game-card:hover::before {
  opacity: 1;
}
.game-card:hover {
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 0 20px rgba(255,111,0,0.6);
  border: 1px solid #ff6f00;
}

/* FORM */
.form-section, .check-section {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 2rem;
  border-radius: 15px;
  max-width: 500px;
  margin: 2rem auto;
  border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
input, select {
  width: 100%;
  padding: 0.8rem;
  margin: 0.5rem 0;
  border-radius: 8px;
  border: 1px solid #333;
  background-color: #1e1e1e;
  color: white;
  transition: 0.3s;
}

input:focus, select:focus {
  border: 1px solid #ff6f00;
  background-color: #2a2a2a;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 0.9rem;
  border-radius: 8px;
  border: none;

  transition: 0.3s;

button:hover {

/* FOOTER */
